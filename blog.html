<!DOCTYPE html>
<html class="light" lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="google-site-verification" content="RIMYxxvRDxZSZb6biGe2CZyeEc7Z34aDsn-xmX7sIT8" />
    <title>Blog - Ataberk's Bar</title>
    <meta name="description" content="Mixology teknikleri, kokteyl tarifleri ve bar kültürü üzerine Türkçe içerikler."/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec7f13",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Epilogue"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        html { scroll-behavior: smooth; }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display" style='font-family: Epilogue, "Noto Sans", sans-serif;'>

<!-- Mobile Menu Overlay -->
<div class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden" id="mobile-menu-overlay"></div>

<!-- Mobile Menu -->
<div class="fixed top-0 right-0 h-full w-64 bg-background-light dark:bg-background-dark border-l border-gray-200 dark:border-gray-800 z-50 transform translate-x-full transition-transform duration-300 ease-in-out" id="mobile-menu">
    <div class="flex flex-col h-full">
        <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-800">
            <h2 class="text-gray-800 dark:text-gray-100 text-lg font-bold">Menu</h2>
            <button class="text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-white" id="close-mobile-menu">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <nav class="flex-1 p-4 overflow-y-auto">
            <ul class="space-y-2">
                <li>
                    <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <span class="material-symbols-outlined">home</span>
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="cocktails.html" class="flex items-center gap-3 px-4 py-3 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">
                        <span class="material-symbols-outlined">local_bar</span>
                        <span>Cocktails</span>
                    </a>
                </li>
                <li>
                    <a href="blog.html" class="flex items-center gap-3 px-4 py-3 bg-primary bg-opacity-10 text-primary font-semibold rounded-lg">
                        <span class="material-symbols-outlined">article</span>
                        <span>Blog</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<div class="relative flex h-auto min-h-screen w-full flex-col">
    <div class="layout-container flex h-full grow flex-col">
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-background-light dark:bg-background-dark border-b border-solid border-b-gray-200 dark:border-b-gray-800">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center gap-3 text-gray-800 dark:text-gray-100">
                        <div class="size-8 text-primary">
                            <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path>
                            </svg>
                        </div>
                        <h2 class="text-gray-800 dark:text-gray-100 text-xl font-bold leading-tight">Ataberk's Bar</h2>
                    </div>
                    <nav class="hidden md:flex items-center space-x-8">
                        <a href="index.html" class="flex items-center gap-2 text-gray-700 dark:text-gray-300 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">home</span>
                            <span>Home</span>
                        </a>
                        <a href="cocktails.html" class="flex items-center gap-2 text-gray-700 dark:text-gray-300 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-xl">local_bar</span>
                            <span>Cocktails</span>
                        </a>
                        <a href="blog.html" class="flex items-center gap-2 text-primary font-semibold border-b-2 border-primary pb-1">
                            <span class="material-symbols-outlined text-xl">article</span>
                            <span>Blog</span>
                        </a>
                    </nav>
                    <button class="md:hidden text-gray-800 dark:text-gray-100" id="menu-toggle">
                        <span class="material-symbols-outlined text-3xl">menu</span>
                    </button>
                </div>
            </div>
        </header>

        <div class="w-full flex flex-1 justify-center py-3 sm:py-5">
            <div class="layout-content-container flex flex-col w-full max-w-5xl flex-1 px-3 sm:px-6 lg:px-8">
                <main class="flex-grow">
                    <!-- Page Title -->
                    <div class="flex flex-wrap justify-between gap-3 p-3 sm:p-4 my-3 sm:my-4">
                        <div class="flex min-w-0 flex-col gap-2 w-full">
                            <p class="text-gray-800 dark:text-gray-100 text-3xl sm:text-4xl lg:text-5xl font-black leading-tight tracking-[-0.033em]">
                                Blog</p>
                            <p class="text-gray-500 dark:text-gray-400 text-sm sm:text-base">Mixology teknikleri, ipuçları ve bar kültürü üzerine notlar</p>
                        </div>
                    </div>

                    <!-- Search Bar -->
                    <div class="px-3 sm:px-4 mb-6">
                        <div class="relative max-w-md">
                            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">search</span>
                            <input type="text"
                                   id="blog-search"
                                   placeholder="Yazılarda ara..."
                                   class="w-full pl-10 pr-4 py-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl text-gray-800 dark:text-gray-100 text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"/>
                        </div>
                    </div>

                    <!-- Tag Filter -->
                    <div id="tag-filter-bar" class="flex flex-nowrap min-w-0 gap-2 overflow-x-auto pb-3 mb-4 px-3 sm:px-4 scrollbar-hide">
                    </div>

                    <!-- Blog Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 px-3 sm:px-4" id="blog-grid">
                    </div>

                    <!-- Empty State -->
                    <div class="hidden px-3 sm:px-4 py-16 text-center" id="empty-state">
                        <span class="material-symbols-outlined text-5xl text-gray-300 dark:text-gray-600 mb-4">search_off</span>
                        <p class="text-gray-500 dark:text-gray-400 text-lg">Aramanızla eşleşen yazı bulunamadı.</p>
                    </div>
                </main>

                <!-- Footer -->
                <footer class="flex flex-col gap-4 sm:gap-6 px-2 sm:px-5 py-6 sm:py-10 mt-6 sm:mt-12 text-center border-t border-solid border-gray-200 dark:border-gray-800">
                    <p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">&copy; 2025 Ataberk Canitez. All Rights Reserved.</p>
                </footer>
            </div>
        </div>
    </div>
</div>

<script>
    // Mobile menu
    const mobileMenu = document.getElementById('mobile-menu');
    const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
    const menuToggle = document.getElementById('menu-toggle');
    const closeMobileMenu = document.getElementById('close-mobile-menu');

    function openMobileMenu() {
        mobileMenu.classList.remove('translate-x-full');
        mobileMenuOverlay.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }
    function closeMobileMenuFunc() {
        mobileMenu.classList.add('translate-x-full');
        mobileMenuOverlay.classList.add('hidden');
        document.body.style.overflow = '';
    }
    menuToggle.addEventListener('click', openMobileMenu);
    closeMobileMenu.addEventListener('click', closeMobileMenuFunc);
    mobileMenuOverlay.addEventListener('click', closeMobileMenuFunc);

    // Blog data
    const blogPosts = [
        {
            id: 1,
            title: "Saline Solution Nedir?",
            summary: "Kokteylinin tadını bir üst seviyeye taşıyan, hazırlaması 2 dakika süren sihirli karışım.",
            date: "2 Haziran 2025",
            readTime: "4 dk",
            tags: ["teknik", "advanced"],
            url: "blog/saline-solution.html",
            icon: "science",
            color: "from-amber-800 via-amber-700 to-yellow-600"
        },
        {
            id: 2,
            title: "Simple Syrup Rehberi",
            summary: "Simple, rich, demerara, bal, agave — hangisi ne zaman kullanılır? Kokteyl şuruplarının tam rehberi.",
            date: "15 Haziran 2025",
            readTime: "5 dk",
            tags: ["temel", "şuruplar"],
            url: "blog/simple-syrup-rehberi.html",
            icon: "water_drop",
            color: "from-yellow-700 via-amber-600 to-orange-500"
        },
    ];

    const blogGrid = document.getElementById('blog-grid');
    const tagFilterBar = document.getElementById('tag-filter-bar');
    const searchInput = document.getElementById('blog-search');
    const emptyState = document.getElementById('empty-state');

    function getAllTags() {
        return Array.from(new Set(blogPosts.flatMap(p => p.tags)));
    }

    function createBlogCard(post) {
        return `
        <a href="${post.url}" class="group block bg-white dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1">
            <div class="h-40 sm:h-48 bg-gradient-to-br ${post.color} relative overflow-hidden">
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="material-symbols-outlined text-white text-6xl opacity-30 group-hover:scale-110 transition-transform duration-300">${post.icon}</span>
                </div>
            </div>
            <div class="p-5">
                <div class="flex flex-wrap gap-2 mb-3">
                    ${post.tags.map(tag => `<span class="px-2 py-0.5 bg-primary bg-opacity-10 text-primary text-xs font-semibold rounded-full">${tag.charAt(0).toUpperCase() + tag.slice(1)}</span>`).join('')}
                </div>
                <h3 class="text-lg sm:text-xl font-bold text-gray-800 dark:text-gray-100 mb-2 group-hover:text-primary transition-colors">${post.title}</h3>
                <p class="text-gray-500 dark:text-gray-400 text-sm leading-relaxed mb-4">${post.summary}</p>
                <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500">
                    <div class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">calendar_today</span>
                        <span>${post.date}</span>
                    </div>
                    <div class="flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">schedule</span>
                        <span>${post.readTime}</span>
                    </div>
                </div>
            </div>
        </a>
        `;
    }

    function renderTagFilter(selectedTag = null) {
        const tags = getAllTags();
        if (tags.length <= 1) {
            tagFilterBar.innerHTML = '';
            return;
        }
        let html = `<button class="tag-btn flex-shrink-0 px-4 py-2 rounded-full border font-semibold text-sm transition-all shadow-sm whitespace-nowrap ${!selectedTag ? 'bg-primary text-white border-primary' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 border-gray-300 dark:border-gray-700 hover:bg-primary hover:text-white hover:border-primary'}" data-tag="all">Tümü</button>`;
        tags.forEach(tag => {
            html += `<button class="tag-btn flex-shrink-0 px-4 py-2 rounded-full border font-semibold text-sm transition-all shadow-sm whitespace-nowrap ${selectedTag === tag ? 'bg-primary text-white border-primary' : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 border-gray-300 dark:border-gray-700 hover:bg-primary hover:text-white hover:border-primary'}" data-tag="${tag}">${tag.charAt(0).toUpperCase() + tag.slice(1)}</button>`;
        });
        tagFilterBar.innerHTML = html;
        tagFilterBar.querySelectorAll('.tag-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tag = btn.dataset.tag;
                currentTag = tag === 'all' ? null : tag;
                renderPosts();
                renderTagFilter(currentTag);
            });
        });
    }

    let currentTag = null;

    function renderPosts() {
        const query = searchInput.value.toLowerCase().trim();
        let filtered = blogPosts;

        if (currentTag) {
            filtered = filtered.filter(p => p.tags.includes(currentTag));
        }
        if (query) {
            filtered = filtered.filter(p =>
                p.title.toLowerCase().includes(query) ||
                p.summary.toLowerCase().includes(query) ||
                p.tags.some(t => t.toLowerCase().includes(query))
            );
        }

        if (filtered.length === 0) {
            blogGrid.innerHTML = '';
            emptyState.classList.remove('hidden');
        } else {
            emptyState.classList.add('hidden');
            blogGrid.innerHTML = filtered.map(createBlogCard).join('');
        }
    }

    searchInput.addEventListener('input', renderPosts);

    document.addEventListener('DOMContentLoaded', () => {
        renderPosts();
        renderTagFilter();
    });
</script>
</body>
</html>
